<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Tunnel Runner</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;min-height:100%;}
  body{background:#030810;overflow:hidden;touch-action:none;user-select:none;-webkit-user-select:none;display:flex;justify-content:center;align-items:flex-start;height:100vh;height:100dvh;min-height:100vh;min-height:100dvh;padding-bottom:env(safe-area-inset-bottom);font-family:'Orbitron',monospace}
  #wrap{position:relative;width:400px;display:flex;flex-direction:column;max-height:calc(100dvh - env(safe-area-inset-bottom));padding-top:12px;padding-bottom:calc(env(safe-area-inset-bottom) + 10px)}
  #gameShell{position:relative;}
  canvas{width:400px;height:440px;display:block;flex:0 0 auto}
  #ctrl{width:400px;height:300px;background:radial-gradient(ellipse at center,#1a1a2e,#0d0d1a);display:flex;justify-content:center;align-items:center;position:relative;flex:0 0 auto}
  #whl{width:260px;height:260px;border-radius:50%;background:radial-gradient(circle at 40% 35%,#c040e0,#9020b0 25%,#6a1080 50%,#3d0a4f 75%,#1a0525);border:5px solid #555;box-shadow:0 0 20px rgba(180,50,220,.4),inset 0 0 30px rgba(0,0,0,.5);position:relative;cursor:grab}
  #whlOut{position:absolute;top:-16px;left:-16px;right:-16px;bottom:-16px;border-radius:50%;background:linear-gradient(135deg,#666,#333 40%,#555 60%,#444);z-index:-1;box-shadow:inset 0 2px 6px rgba(255,255,255,.15),0 6px 20px rgba(0,0,0,.7)}
  #whl::before{content:'';position:absolute;top:12px;left:12px;right:12px;bottom:12px;border-radius:50%;border:2px solid rgba(200,100,255,.25);pointer-events:none}
  .ch{position:absolute;pointer-events:none;background:rgba(200,100,255,.2)}
  .ch.h{top:50%;left:12%;width:76%;height:2px;transform:translateY(-50%)}
  .ch.v{top:12%;left:50%;width:2px;height:76%;transform:translateX(-50%)}
  .tk{position:absolute;background:rgba(255,255,255,.6);pointer-events:none}
  .tk.t{top:6px;left:50%;width:2px;height:14px;transform:translateX(-50%)}
  .tk.b{bottom:6px;left:50%;width:2px;height:14px;transform:translateX(-50%)}
  .tk.l{left:6px;top:50%;width:14px;height:2px;transform:translateY(-50%)}
  .tk.r{right:6px;top:50%;width:14px;height:2px;transform:translateY(-50%)}
  #jmp{position:absolute;width:72px;height:72px;border-radius:50%;background:radial-gradient(circle at 40% 35%,#f0c0ff,#d080f0 40%,#a040c0);border:3px solid rgba(255,255,255,.5);box-shadow:0 0 15px rgba(200,100,255,.6);top:50%;left:50%;transform:translate(-50%,-50%);cursor:pointer;z-index:10}
  #jmp:active{transform:translate(-50%,-50%) scale(.88)}
  #posInd{position:absolute;width:6px;height:32px;background:#fff;border-radius:3px;pointer-events:none;box-shadow:0 0 8px rgba(255,255,255,.9),0 0 16px rgba(200,100,255,.6);z-index:5;transform-origin:center 130px}
  #hud{position:absolute;top:4px;left:0;right:0;padding:10px 14px;pointer-events:none;z-index:5}
  .hs{color:#ffd700;font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;text-shadow:0 0 6px rgba(255,200,0,.5)}
  .hr{color:#c0c0d0;font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:500;margin-top:2px}
  .hh{position:absolute;top:46px;right:14px;font-size:18px;color:#ffd700;font-family:'Rajdhani',sans-serif;font-weight:700;text-shadow:0 0 6px rgba(255,200,0,.5)}
  #pauseBtn{position:absolute;top:8px;right:10px;width:42px;height:42px;border-radius:50%;border:2px solid rgba(255,255,255,.35);background:rgba(8,18,40,.78);color:#d8ecff;font-size:18px;font-weight:700;cursor:pointer;z-index:8;box-shadow:0 0 10px rgba(0,0,0,.25)}
  #pauseBtn:hover{background:rgba(18,38,78,.95)}
  /* hint text */
  #hint{position:absolute;bottom:8px;left:0;right:0;text-align:center;font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;color:#aac;text-shadow:0 0 8px rgba(100,180,255,.5);pointer-events:none;z-index:5;opacity:0;transition:opacity .3s}
  #hint.show{opacity:1}
  #ov{position:absolute;top:0;left:0;width:400px;height:440px;display:flex;flex-direction:column;justify-content:center;align-items:center;background:rgba(5,5,20,.9);z-index:20;backdrop-filter:blur(4px)}
  #ov.hidden{display:none}
  #ov h1{font-size:26px;font-weight:900;color:#4ac;text-shadow:0 0 20px rgba(60,180,220,.7);margin-bottom:6px;letter-spacing:3px}
  #ov h2{font-size:18px;font-weight:700;color:#f46;margin-bottom:10px}
  #ov p{font-family:'Rajdhani',sans-serif;color:#99a;font-size:14px;margin-bottom:5px;text-align:center;padding:0 20px}
  .fs{font-family:'Orbitron',monospace;color:#ffd700;font-size:24px;margin:14px 0;text-shadow:0 0 12px rgba(255,200,0,.5)}
  .btn{margin-top:18px;padding:12px 36px;font-family:'Orbitron',monospace;font-size:14px;font-weight:700;color:#fff;background:linear-gradient(135deg,#0088cc,#005588);border:2px solid rgba(0,180,255,.5);border-radius:30px;cursor:pointer;letter-spacing:3px;box-shadow:0 0 16px rgba(0,140,220,.3)}
  .btn:hover{box-shadow:0 0 26px rgba(0,180,255,.6);transform:scale(1.05)}
  @media (max-width: 430px){
    #wrap{width:100vw;max-width:400px;margin:0 auto;padding-top:12px;padding-bottom:calc(env(safe-area-inset-bottom) + 14px)}
    canvas,#ctrl{width:100%}
    canvas{height:auto;aspect-ratio:10 / 11}
    #ctrl{height:280px}
    #whl{width:240px;height:240px}
    #jmp{width:68px;height:68px}
  }
</style>
</head>
<body>
<div id="wrap">
  <div id="gameShell">
    <button id="pauseBtn" aria-label="Pause">❚❚</button>
    <canvas id="c" width="800" height="880"></canvas>
    <div id="hud"><div class="hs" id="sc">0</div><div class="hr" id="rc">Record: 0</div><div class="hh" id="hrt">🪙 0</div></div>
    <div id="hint"></div>
    <div id="ov">
      <h1>TUNNEL RUNNER</h1>
      <p>Steuerrad drehen = Position im Tunnel</p>
      <p>Mitte / Leertaste = Springen</p>
      <p style="color:#0cf">🔵 Cyan-Ring → Springen!</p>
      <p style="color:#c63">🟤 Braune Blöcke → Ausweichen!</p>
      <p style="color:#fd0">🪙 Münzen → Einsammeln!</p>
      <button class="btn" id="go">START</button>
    </div>
  </div>
  <div id="ctrl">
    <div style="position:relative"><div id="whlOut"></div>
      <div id="whl">
        <div class="ch h"></div><div class="ch v"></div>
        <div class="tk t"></div><div class="tk b"></div><div class="tk l"></div><div class="tk r"></div>
        <div id="jmp"></div>
      </div>
    </div>
    <div id="posInd"></div>
  </div>
</div>
<script>
const cv=document.getElementById('c'),cx=cv.getContext('2d');
const pauseBtn=document.getElementById('pauseBtn');
const W=cv.width,H=cv.height,CX=W/2,CY=H*.47;
const OR=360,IR=45;

// ==================== GAME CONFIG ====================
const CFG={
  playerZ:.82,
  obsSpeed:.00355,
  jumpDur:32,
  jumpHeight:.25,
  steerSmooth:.105,
  steerMax:.095,
  graceTime:150,
  spawnStart:118,
  spawnMin:46,
  rampSpeed:.00012,
};

// ==================== STATE ====================
let run=false,over=false,paused=false,sc=0,hi=0,lives=1,spd=1,dist=0,inv=0,fc=0,coinCount=0;
let pAng=Math.PI/2,jumping=false,jf=0,wspin=0;
let sAng=Math.PI/2,drag=false;
let playerSectorVisual=0;
let obs=[],cns=[],parts=[];
let spT=0,cnT=0;
let spawnPhase=0;
let coinModeTimer=0;
let coinCollectCooldown=0;
let laneBlockCooldown=0;
let passageSpawnGuard=0;

// The tunnel is divided into 8 equal SECTORS for collision
// This makes collision grid-based and 100% predictable
const SECTORS=8;
const SECTOR_SIZE=Math.PI*2/SECTORS;
const ALL_SECTORS=Array.from({length:SECTORS},(_,i)=>i);

function getSector(angle){
  let a=((angle%(Math.PI*2))+(Math.PI*2))%(Math.PI*2);
  return Math.floor(a/SECTOR_SIZE);
}

const PERSPECTIVE_DEPTH_NEAR=1;
const PERSPECTIVE_DEPTH_FAR=OR/IR;
const PERSPECTIVE_DEPTH_SPAN=PERSPECTIVE_DEPTH_FAR-PERSPECTIVE_DEPTH_NEAR;
const PERSPECTIVE_FALLOFF=1.5;
const PERSPECTIVE_NEAR_EXTENSION=1.35;
const PERSPECTIVE_MIN_DEPTH=.16;

function projectDepth(z){
  if(z<=1){
    const clamped=Math.max(0,Math.min(1,z));
    const depthT=Math.pow(1-clamped,PERSPECTIVE_FALLOFF);
    return PERSPECTIVE_DEPTH_NEAR+PERSPECTIVE_DEPTH_SPAN*depthT;
  }
  const over=z-1;
  return Math.max(PERSPECTIVE_MIN_DEPTH,PERSPECTIVE_DEPTH_NEAR-over*PERSPECTIVE_NEAR_EXTENSION);
}

function zScale(z){
  return PERSPECTIVE_DEPTH_NEAR/projectDepth(z);
}

function z2r(z){
  return OR*zScale(z);
}

// ==================== TUNNEL ====================
const NBANDS=12,BSPC=.11;
const NLONG=24; // longitudinal panel lines
let bands=[];
function initBands(){bands=[];for(let i=0;i<NBANDS;i++)bands.push({z:i*BSPC,id:i})}
function updateBands(dt){
  const s=dt*spd;
  for(let b of bands)b.z+=CFG.obsSpeed*s;
  for(let b of bands)if(b.z>1.15){let m=1;for(let o of bands)if(o.z<m)m=o.z;b.z=m-BSPC;b.id--}
}

function getTunnelHue(){
  // Color shifts over time: blue(210) → teal(180) → green(140) → purple(280) → red(0) → blue again
  const cycle=dist*.003; // slow color shift
  const hues=[210,180,140,280,340,210];
  const idx=Math.floor(cycle)%hues.length;
  const next=(idx+1)%hues.length;
  const t=cycle%1;
  // Lerp between hues
  let h0=hues[idx],h1=hues[next];
  if(Math.abs(h1-h0)>180){if(h1>h0)h0+=360;else h1+=360}
  return((h0+(h1-h0)*t)%360);
}

function drawTunnel(){
  const tunnelHue=getTunnelHue();
  // Background matches tunnel hue
  const bgR=Math.floor(Math.max(0,Math.cos((tunnelHue-210)*Math.PI/180)*.03+.02)*255);
  const bgG=Math.floor(Math.max(0,Math.cos((tunnelHue-150)*Math.PI/180)*.04+.03)*255);
  const bgB=Math.floor(Math.max(0,Math.cos((tunnelHue-270)*Math.PI/180)*.06+.08)*255);
  cx.fillStyle=`rgb(${bgR},${bgG},${bgB})`;cx.fillRect(0,0,W,H);
  
  const sb=[...bands].sort((a,b)=>a.z-b.z);
  
  for(let i=0;i<sb.length-1;i++){
    const b=sb[i],n=sb[i+1];
    if(b.z<-.01||b.z>1.06||n.z<-.01)continue;
    const r0=z2r(Math.max(0,b.z)),r1=z2r(Math.min(1.06,n.z));
    if(r1-r0<.5)continue;
    
    const isDark=b.id%2===0;
    
    for(let j=0;j<NLONG;j++){
      const a0=(j/NLONG)*Math.PI*2;
      const a1=((j+1)/NLONG)*Math.PI*2;
      
      const panelVar=((j%2)===0)?.03:-.03;
      const baseLight=isDark?.28:.42;
      const light=baseLight+panelVar;
      const depthFade=.4+Math.min(1,b.z)*.6;
      const finalLight=light*depthFade;
      
      // Use tunnel hue for color
      const sat=40+finalLight*30;
      const lum=Math.floor(finalLight*45);
      
      cx.beginPath();
      cx.arc(CX,CY,r1,a0,a1);
      cx.arc(CX,CY,r0,a1,a0,true);
      cx.closePath();
      cx.fillStyle=`hsl(${tunnelHue},${sat}%,${lum}%)`;
      cx.fill();
    }
    
    // Ring edge lines (between bands) — subtle
    cx.beginPath();cx.arc(CX,CY,r1,0,Math.PI*2);
    cx.strokeStyle=`rgba(8,18,40,${.4+Math.min(1,n.z)*.4})`;
    cx.lineWidth=1+Math.min(1,n.z)*1.5;
    cx.stroke();
  }
  
  // Longitudinal panel edge lines (structural beams)
  for(let i=0;i<NLONG;i++){
    const a=(i/NLONG)*Math.PI*2;
    const ix=CX+Math.cos(a)*IR, iy=CY+Math.sin(a)*IR;
    const ox=CX+Math.cos(a)*OR, oy=CY+Math.sin(a)*OR;
    const isMajor=i%4===0;
    
    cx.beginPath();cx.moveTo(ix,iy);cx.lineTo(ox,oy);
    if(isMajor){
      cx.strokeStyle='rgba(30,60,110,.6)';cx.lineWidth=2.5;
    } else {
      cx.strokeStyle='rgba(18,40,80,.45)';cx.lineWidth=1.5;
    }
    cx.stroke();
  }
  
  // Vanishing point — dark with subtle blue rim
  const vg=cx.createRadialGradient(CX,CY,0,CX,CY,IR+12);
  vg.addColorStop(0,'#000');
  vg.addColorStop(.75,'#000');
  vg.addColorStop(1,'#0a1530');
  cx.beginPath();cx.arc(CX,CY,IR+12,0,Math.PI*2);cx.fillStyle=vg;cx.fill();
}

// ==================== PLAYER ====================
function jOff(){return jumping?Math.sin((jf/CFG.jumpDur)*Math.PI)*CFG.jumpHeight:0}
function pPos(){const jo=jOff(),r=z2r(CFG.playerZ-jo);return{x:CX+Math.cos(pAng)*r,y:CY+Math.sin(pAng)*r,r}}

function drawPlayer(){
  const p=pPos(),playerScale=zScale(CFG.playerZ-jOff()),sz=12+playerScale*24;
  const shadowR=z2r(CFG.playerZ);
  const shadowX=CX+Math.cos(pAng)*shadowR;
  const shadowY=CY+Math.sin(pAng)*shadowR;
  const lift=Math.max(0,jOff()/CFG.jumpHeight);
  
  // Permanent contact shadow / wall marker makes position and timing easier to read
  cx.save();
  cx.translate(shadowX,shadowY);
  cx.rotate(pAng+Math.PI/2);
  cx.scale(1,.55+.2*lift);
  cx.beginPath();
  cx.arc(0,0,sz*(.8-.12*lift),0,Math.PI*2);
  cx.fillStyle=`rgba(0,0,0,${.3-.08*lift})`;
  cx.fill();
  cx.beginPath();
  cx.arc(0,0,sz*(.98-.08*lift),0,Math.PI*2);
  cx.strokeStyle=`rgba(120,220,255,${.34-.1*lift})`;
  cx.lineWidth=Math.max(2.2,sz*.095);
  cx.stroke();
  cx.restore();
  
  // Long trail going INTO the tunnel (fades toward center = depth)
  // This is key for the "driving forward" feeling
  for(let t=1;t<=6;t++){
    const trailZ=CFG.playerZ-jOff()-.03*t;
    if(trailZ<.05)break;
    const tr=z2r(trailZ);
    const tAlpha=.35-t*.05;
    const tWidth=sz*(.6-t*.06);
    if(tAlpha<=0||tWidth<=0)break;
    cx.beginPath();cx.arc(CX,CY,tr,pAng-.08,pAng+.08);
    cx.strokeStyle=`rgba(30,80,140,${tAlpha})`;cx.lineWidth=tWidth;cx.lineCap='round';cx.stroke();
  }
  
  // Glow under wheel
  const gl=cx.createRadialGradient(p.x,p.y,0,p.x,p.y,sz*1.5);
  gl.addColorStop(0,'rgba(0,160,255,.18)');gl.addColorStop(1,'rgba(0,60,150,0)');
  cx.fillStyle=gl;cx.beginPath();cx.arc(p.x,p.y,sz*1.5,0,Math.PI*2);cx.fill();
  
  cx.save();cx.translate(p.x,p.y);
  if(inv>0&&Math.floor(inv/3)%2===0)cx.globalAlpha=.3;
  cx.rotate(wspin);
  // Tire
  cx.beginPath();cx.arc(0,0,sz,0,Math.PI*2);cx.fillStyle='#0d1e35';cx.fill();cx.strokeStyle='#00aadd';cx.lineWidth=2.5;cx.stroke();
  // Treads
  for(let i=0;i<8;i++){const a=(i/8)*Math.PI*2;cx.beginPath();cx.moveTo(Math.cos(a)*sz*.95,Math.sin(a)*sz*.95);cx.lineTo(Math.cos(a)*sz*.75,Math.sin(a)*sz*.75);cx.strokeStyle='rgba(0,140,200,.35)';cx.lineWidth=2.5;cx.stroke()}
  // Spokes
  for(let i=0;i<4;i++){const a=(i/4)*Math.PI*2;cx.beginPath();cx.moveTo(0,0);cx.lineTo(Math.cos(a)*sz*.65,Math.sin(a)*sz*.65);cx.strokeStyle='#0088bb';cx.lineWidth=2.5;cx.stroke()}
  // Hub
  cx.beginPath();cx.arc(0,0,sz*.22,0,Math.PI*2);cx.fillStyle='#33ccee';cx.fill();
  cx.restore();
}

let lastMilestone=0;
let sparks=[];

function updatePlayer(dt){
  let d=sAng-pAng;d=Math.atan2(Math.sin(d),Math.cos(d));
  pAng+=Math.sign(d)*Math.min(Math.abs(d)*CFG.steerSmooth,CFG.steerMax)*dt;
  pAng=((pAng%(Math.PI*2))+(Math.PI*2))%(Math.PI*2);
  playerSectorVisual=getSector(pAng+SECTOR_SIZE*.5);
  if(jumping){jf+=dt;if(jf>=CFG.jumpDur){jumping=false;jf=0}}
  if(inv>0)inv-=dt;
  wspin+=.08*spd*dt;
  
  // Spawn sparks when on the wall (not jumping)
  if(!jumping&&run&&Math.random()<.3*spd){
    const p=pPos();
    sparks.push({
      x:p.x,y:p.y,
      vx:(Math.random()-.5)*3+Math.cos(pAng+Math.PI)*2,
      vy:(Math.random()-.5)*3+Math.sin(pAng+Math.PI)*2,
      life:1,
      size:1+Math.random()*2
    });
  }
  
  // Milestone check
  const milestones=[5000,10000,15000,20000,25000,30000,40000,50000,75000,100000];
  for(let m of milestones){
    if(sc>=m&&lastMilestone<m){
      lastMilestone=m;
      addFloat(CX,CY+80,m>=50000?'INCREDIBLE!':m>=25000?'AMAZING!':m>=10000?'GREAT!':'NICE!',
        m>=50000?'#ff44ff':m>=25000?'#44ffff':m>=10000?'#44ff44':'#ffff44');
      addFloat(CX,CY+110,m.toLocaleString()+' PTS','#ffffff');
    }
  }
}

function updateSparks(dt){
  for(let s of sparks){s.x+=s.vx*dt;s.y+=s.vy*dt;s.life-=.06*dt}
  sparks=sparks.filter(s=>s.life>0);
}

function drawSparks(){
  for(let s of sparks){
    cx.globalAlpha=s.life;
    cx.beginPath();cx.arc(s.x,s.y,s.size*s.life,0,Math.PI*2);
    cx.fillStyle=`hsl(${30+Math.random()*30},100%,${60+Math.random()*30}%)`;
    cx.fill();
  }
  cx.globalAlpha=1;
}

function doJump(){if(!jumping&&run){jumping=true;jf=0}}

// ==================== OBSTACLES ====================
let lastCoinSpawnZ=0;

function sectorListWithout(blocked){
  const blockedSet=new Set(blocked);
  return ALL_SECTORS.filter(s=>!blockedSet.has(s));
}

function getObstacleProfile(o){
  if(o.type==='block')return{start:o.z,end:o.z+(o.depth||.08),safeSectors:sectorListWithout(o.sectors||[])};
  if(o.type==='ring_segment')return{start:o.z,end:o.z+(o.depth||.08),safeSectors:[...(o.sectors||[])]};
  if(o.type==='ring')return{start:o.z,end:o.z+(o.depth||.07),safeSectors:[...ALL_SECTORS]};
  return null;
}

function canPlaceProfiles(profiles){
  const existing=obs.map(getObstacleProfile).filter(Boolean);
  const overlapBuffer=.05;
  for(const candidate of profiles){
    let shared=[...candidate.safeSectors];
    for(const current of existing){
      if(current.end+overlapBuffer<=candidate.start||current.start>=candidate.end+overlapBuffer)continue;
      shared=shared.filter(s=>current.safeSectors.includes(s));
      if(shared.length===0)return false;
    }
  }
  return true;
}

function trySpawn(generator, attempts=20){
  for(let i=0;i<attempts;i++){
    const candidate=generator();
    if(!candidate)continue;
    if(canPlaceProfiles(candidate.profiles)){
      candidate.commit();
      return candidate.result;
    }
  }
  return null;
}

function spawnGroup(){
  const diff=Math.min(1,dist/5000);
  const phase=spawnPhase%7;
  spawnPhase++;

  if(laneBlockCooldown>0)laneBlockCooldown--;

  if(diff>.28&&laneBlockCooldown<=0&&(phase===2||phase===5)&&Math.random()<.65){
    const blocked=spawnLaneBlockPassage(diff);
    if(blocked){
      laneBlockCooldown=5;
      passageSpawnGuard=7;
      if(Math.random()<.8)spawnCoinsInGap(blocked);
      return;
    }
  }

  if(phase===0){
    const blocked=spawnBlockSet(diff*.85);
    if(blocked&&Math.random()<.75)spawnCoinsInGap(blocked);
    return;
  }
  if(phase===1){
    if(Math.random()<.65&&passageSpawnGuard<=0){
      spawnRingObs();
    } else {
      const blocked=spawnBlockSet(diff*.9);
      if(blocked&&Math.random()<.5)spawnCoinsInGap(blocked);
    }
    return;
  }
  if(phase===2){
    const blocked=spawnBlockSet(diff);
    if(blocked&&Math.random()<.35)spawnCoinsInGap(blocked);
    return;
  }
  if(phase===3){
    if(diff>.22){
      if(!spawnComboRing(diff)&&passageSpawnGuard<=0)spawnRingObs();
    } else if(passageSpawnGuard<=0){
      spawnRingObs();
    } else {
      const blocked=spawnBlockSet(diff*.82);
      if(blocked&&Math.random()<.45)spawnCoinsInGap(blocked);
    }
    return;
  }
  if(phase===4){
    if(Math.random()<.9)spawnCoins();
    return;
  }
  if(phase===5){
    const blocked=spawnBlockSet(diff*.95);
    if(blocked&&Math.random()<.55)spawnCoinsInGap(blocked);
    return;
  }

  if(Math.random()<.45)spawnCoins();
}

function spawnBlockSet(diff){
  return trySpawn(()=>{
    const minBlock=1,maxBlock=Math.floor(1+diff*5);
    const numBlock=minBlock+Math.floor(Math.random()*(maxBlock-minBlock+1));
    const pSec=getSector(pAng);
    let available=[];
    for(let i=0;i<SECTORS;i++)if(i!==pSec&&i!==(pSec+1)%SECTORS&&i!==(pSec+SECTORS-1)%SECTORS)available.push(i);
    for(let i=available.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[available[i],available[j]]=[available[j],available[i]]}
    const blocked=available.slice(0,Math.min(numBlock,available.length)).sort((a,b)=>a-b);
    const depth=.09+Math.random()*.04;
    return{
      profiles:[{start:0,end:depth,safeSectors:sectorListWithout(blocked)}],
      commit:()=>pushMergedBlocks(blocked,depth),
      result:blocked
    };
  });
}

function spawnRingObs(){
  obs.push({type:'ring',z:0,depth:.07,spd:CFG.obsSpeed,passed:false,sectors:null});
}

function spawnLaneBlockPassage(diff){
  return trySpawn(()=>{
    const width=diff>.7?(Math.random()<.55?4:3):3;
    const span=3+Math.floor(diff*3);
    const playerSector=getSector(pAng);
    let start=(playerSector+2+Math.floor(Math.random()*3))%SECTORS;
    const blocked=[];
    for(let i=0;i<width;i++)blocked.push((start+i)%SECTORS);
    const blockedSorted=blocked.sort((a,b)=>a-b);
    const profiles=[];
    const segments=[];
    for(let i=0;i<span;i++){
      const zOffset=-(i*.11);
      const depth=.1+Math.random()*.025;
      segments.push({depth,zOffset});
      profiles.push({start:zOffset,end:zOffset+depth,safeSectors:sectorListWithout(blockedSorted)});
    }
    return{
      profiles,
      commit:()=>{
        for(const segment of segments)pushMergedBlocks(blockedSorted,segment.depth,segment.zOffset);
      },
      result:blockedSorted
    };
  });
}

function pushMergedBlocks(sectors, depth=.08, zOffset=0){
  const normalized=[...sectors].map(s=>((s%SECTORS)+SECTORS)%SECTORS).sort((a,b)=>a-b);
  const uniq=[...new Set(normalized)];
  const occupied=new Array(SECTORS).fill(false);
  for(const s of uniq)occupied[s]=true;
  const groups=[];
  let i=0;
  while(i<SECTORS){
    if(!occupied[i]){i++;continue}
    const group=[];
    let j=i;
    while(j<SECTORS&&occupied[j]){group.push(j);j++}
    groups.push(group);
    i=j;
  }
  if(occupied[0]&&occupied[SECTORS-1]&&groups.length>1){
    const first=groups[0];
    const last=groups[groups.length-1];
    groups[0]=last.concat(first);
    groups.pop();
  }

  for(const group of groups){
    const sortedGroup=[...group].sort((a,b)=>a-b);
    const first=sortedGroup[0];
    const len=sortedGroup.length;
    const center=((first+len/2)%SECTORS)*SECTOR_SIZE;
    const arc=len*SECTOR_SIZE;
    obs.push({type:'block',angle:center,arcSize:arc,z:zOffset,depth,spd:CFG.obsSpeed,passed:false,sectors:[...sortedGroup]});
  }
}

function spawnComboRing(diff){
  // Full ring: mostly brown (dodge), 1-2 sectors blue (jumpable)
  return trySpawn(()=>{
    const numBlue=diff>.6?1:1+Math.floor(Math.random()*2);
    let all=[...ALL_SECTORS];for(let i=all.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[all[i],all[j]]=[all[j],all[i]]}
    const blue=all.slice(0,numBlue).sort((a,b)=>a-b);
    const brown=ALL_SECTORS.filter(i=>!blue.includes(i));
    const depth=.08;
    return{
      profiles:[{start:0,end:depth,safeSectors:[...blue]}],
      commit:()=>{
        for(let i=0;i<SECTORS;i++){
          const angle=i*SECTOR_SIZE+SECTOR_SIZE/2;
          if(blue.includes(i)){
            obs.push({type:'ring_segment',angle,arcSize:SECTOR_SIZE,z:0,depth:.08,spd:CFG.obsSpeed,passed:false,sectors:[i]});
          }
        }
        pushMergedBlocks(brown,.08);
      },
      result:blue
    };
  });
}

function updateObs(dt){
  const s=dt*spd;
  if(passageSpawnGuard>0)passageSpawnGuard-=dt;
  for(let o of obs){
    const t=Math.max(0,Math.min(1,o.z));
    const accel=.9+.22*t+.04*t*t;
    o.z+=o.spd*s*accel;
  }
  obs=obs.filter(o=>o.z<1.15);
  if(inv>0)return;
  
  const isJump=jOff()>.06;
  const pSec=playerSectorVisual;
  const collisionAngle=pAng;
  
  for(let o of obs){
    if(o.passed)continue;
    const back=o.z+(o.depth||.05);
    if(o.z>CFG.playerZ+.01){o.passed=true;continue}
    if(!(o.z<=CFG.playerZ+.005&&back>=CFG.playerZ-.005))continue;
    
    if(o.type==='ring'){
      if(isJump){o.passed=true;continue}
      o.passed=true;die();return;
    }
    if(o.type==='block'){
      if(o.sectors&&o.sectors.includes(pSec)){
        let ad=Math.abs(collisionAngle-o.angle);
        ad=Math.min(ad,Math.PI*2-ad);
        const halfArc=Math.max(0,o.arcSize/2-.035);
        if(ad<halfArc){
          o.passed=true;die();return;
        }
      }
      if(back>CFG.playerZ)o.passed=true;
    }
    if(o.type==='ring_segment'){
      if(o.sectors&&o.sectors.includes(pSec)){
        let ad=Math.abs(collisionAngle-o.angle);
        ad=Math.min(ad,Math.PI*2-ad);
        const halfArc=Math.max(0,o.arcSize/2-.035);
        if(ad<halfArc){
          if(isJump){o.passed=true;continue}
          o.passed=true;die();return;
        }
      }
      if(back>CFG.playerZ)o.passed=true;
    }
  }
}

// ==================== COINS ====================
function getBlockedSectorsAtZ(z){
  const blocked=new Set();
  for(const o of obs){
    if(o.passed||!o.sectors)continue;
    const back=o.z+(o.depth||.05);
    if(o.z<=z+.02&&back>=z-.02){
      for(const s of o.sectors)blocked.add(s);
    }
  }
  return blocked;
}

function isCoinPathSafe(angle,zStart,zStep,count){
  const sector=getSector(angle);
  for(let i=0;i<count;i++){
    const z=zStart-zStep*i;
    const blocked=getBlockedSectorsAtZ(z);
    if(blocked.has(sector))return false;
  }
  return true;
}

function spawnCoins(){
  const activeCoinCount=cns.filter(c=>!c.collected&&!c.missed&&c.z<CFG.playerZ).length;
  if(activeCoinCount>0||coinModeTimer>0)return;

  const nearObs=obs.filter(o=>o.z<.7);
  if(nearObs.length>0)return;

  const safeSector=getSector(pAng);
  const safeAngle=safeSector*SECTOR_SIZE+SECTOR_SIZE/2;
  const start=safeAngle+(Math.random()<.5?-1:1)*.03;
  const turns=.2+Math.random()*.04;
  const dir=Math.random()<.5?1:-1;
  const n=16;
  for(let i=0;i<n;i++){
    const t=i/(n-1);
    const angle=start+dir*(turns*Math.PI*2)*t;
    const z=-.05-.06*i;
    const sector=getSector(angle);
    const blocked=getBlockedSectorsAtZ(z);
    if(blocked.has(sector))continue;
    if(!isCoinPathSafe(angle,z,.06,2))continue;
    cns.push({
      angle,
      z,
      collected:false
    });
  }
  coinModeTimer=150;
}

function spawnCoinsInGap(blockedSectors){
  const freeSectors=[];
  for(let i=0;i<SECTORS;i++){
    if(!blockedSectors.includes(i))freeSectors.push(i);
  }
  if(freeSectors.length===0)return;
  
  let bestStart=-1,bestLen=0,curStart=0,curLen=0;
  for(let i=0;i<SECTORS;i++){
    if(freeSectors.includes(i)){
      if(curLen===0)curStart=i;
      curLen++;
      if(curLen>bestLen){bestLen=curLen;bestStart=curStart}
    } else {
      curLen=0;
    }
  }
  
  if(bestStart<0)return;
  
  const gapSector=((bestStart+Math.floor(bestLen/2))%SECTORS+SECTORS)%SECTORS;
  const gapCenter=gapSector*SECTOR_SIZE+SECTOR_SIZE/2;
  
  const n=3;
  if(!isCoinPathSafe(gapCenter,-.02,.04,n))return;
  for(let i=0;i<n;i++){
    const z=-.02-.04*i;
    const blocked=getBlockedSectorsAtZ(z);
    if(blocked.has(gapSector))continue;
    cns.push({
      angle:gapCenter,
      z,
      collected:false
    });
  }
}

function updateCoins(dt){
  const s=dt*spd;
  for(let c of cns)c.z+=CFG.obsSpeed*s;
  cns=cns.filter(c=>c.z<1.15&&!(c.missed&&(c.missedTime||0)>1.2));
  if(coinModeTimer>0)coinModeTimer-=dt;
  if(coinCollectCooldown>0)coinCollectCooldown-=dt;

  // Cannot collect coins AT ALL during a jump
  if(jumping)return;

  // Collect at most one coin, then force a short cooldown so nearby spiral coins do not chain-trigger
  let bestCoin=null;
  let bestScore=999;

  for(let c of cns){
    if(c.collected||c.missed)continue;

    const dz=Math.abs(c.z-CFG.playerZ);
    let ad=Math.abs(pAng-c.angle);ad=Math.min(ad,Math.PI*2-ad);
    const sectorDelta=Math.abs(getSector(c.angle)-playerSectorVisual);
    const wrappedSectorDelta=Math.min(sectorDelta,SECTORS-sectorDelta);
    const nearSector=wrappedSectorDelta<=1;

    if(coinCollectCooldown<=0&&nearSector&&dz<.04&&ad<.18){
      const score=dz*2.2+ad+(wrappedSectorDelta*.03);
      if(score<bestScore){bestScore=score;bestCoin=c}
    }

    // Mark as missed if it passed the player
    if(c.z>CFG.playerZ+.012&&!c.collected){
      c.missed=true;c.missedTime=0;
      const cr=z2r(c.z);
      addFloat(CX+Math.cos(c.angle)*cr,CY+Math.sin(c.angle)*cr,'MISS','#ff4444');
    }
  }

  if(bestCoin){
    bestCoin.collected=true;
    sc+=100;coinCount++;spawnParts(bestCoin.angle,bestCoin.z);
    const cr=z2r(bestCoin.z);
    addFloat(CX+Math.cos(bestCoin.angle)*cr,CY+Math.sin(bestCoin.angle)*cr,'+1 COIN','#ffdd00');
    coinCollectCooldown=3;
  }
}

// ==================== GAME LOOP ====================
let lastT=performance.now();
let firstBlockShown=false,firstRingShown=false;

function loop(ts){
  const dt=Math.min((ts-lastT)/16.67,3);lastT=ts;
  if(run&&!paused){
    fc+=dt;dist+=spd*dt;sc+=Math.floor(spd*dt*2);
    spd=1+dist*CFG.rampSpeed;
    
    // Spawning
    spT+=dt;
    if(dist>CFG.graceTime){
      const rate=Math.max(CFG.spawnMin,CFG.spawnStart-dist*.008);
      if(spT>rate){
        spT=0;
        spawnGroup();
      }
    }
    // Coins — spawn in quiet moments
    cnT+=dt;
    if(cnT>118&&dist>140&&coinModeTimer<=0){cnT=0;spawnCoins()}
    
    updatePlayer(dt);updateBands(dt);updateObs(dt);updateCoins(dt);updateParts(dt);updateSparks(dt);updateFloats(dt);updateHint(dt);updHUD();
  }
  drawTunnel();drawSceneSplit();drawSparks();drawParts();drawFloats();
  requestAnimationFrame(loop);
}

// Split scene drawing: items behind player → player → items at/in-front of player
// This creates the 3D effect where the ring partially covers the wheel during a jump
function drawSceneSplit(){
  const items=[];
  for(let o of obs){if(o.z>=.05)items.push({type:'obs',obj:o,z:o.z})}
  for(let c of cns){if(!c.collected&&c.z>=.05)items.push({type:'coin',obj:c,z:c.z})}
  items.sort((a,b)=>a.z-b.z);
  
  const playerDepth=CFG.playerZ;
  // Threshold: items "at" the player if within this range
  const nearThreshold=playerDepth-.03;
  
  // 1. Draw items BEHIND player (far away)
  for(let item of items){
    if(item.z>=nearThreshold)continue;
    if(item.type==='obs')drawSingleObs(item.obj);
    else drawSingleCoin(item.obj);
  }
  
  // 2. Draw player
  drawPlayer();
  
  // 3. Draw items AT or IN FRONT of player (these will cover the wheel when jumping over)
  for(let item of items){
    if(item.z<nearThreshold)continue;
    if(item.type==='obs')drawSingleObs(item.obj);
    else drawSingleCoin(item.obj);
  }
}

function drawSingleObs(o){
  if(o.z<.04)return;
  
  // Both radii calculated through z2r — thickness grows with perspective naturally
  // Blocks have large z-depth, rings have medium z-depth
  const blockDepth=.14; // z-space depth for blocks (massive walls)
  const ringDepth=.08;  // z-space depth for rings
  const zDepth=o.type==='block'?blockDepth:ringDepth;
  
  const rf=z2r(o.z);
  const rb=z2r(Math.min(1.1,o.z+zDepth));
  const thickness=rb-rf;
  const frontWeight=Math.max(1,thickness*.1);
  
  if(rf<10||thickness<2)return;
  if(o.passed&&rf>OR*1.9)return;
  
  if(o.type==='ring'){
    // === MASSIVE 3D RING ===
    // Back face (deep shadow)
    cx.beginPath();cx.arc(CX,CY,rb,0,Math.PI*2);cx.arc(CX,CY,rf,0,Math.PI*2,true);
    cx.fillStyle='#044050';cx.fill();
    
    // Middle section
    const r1=rf+thickness*.3, r2=rf+thickness*.7;
    cx.beginPath();cx.arc(CX,CY,r2,0,Math.PI*2);cx.arc(CX,CY,r1,0,Math.PI*2,true);
    cx.fillStyle='#088898';cx.fill();
    
    // Front face (bright)
    cx.beginPath();cx.arc(CX,CY,rb,0,Math.PI*2);cx.arc(CX,CY,r2,0,Math.PI*2,true);
    cx.fillStyle='#0cc8dd';cx.fill();
    
    // Bright outer edge
    cx.beginPath();cx.arc(CX,CY,rb,0,Math.PI*2);
    cx.strokeStyle='#44eeff';cx.lineWidth=Math.max(2,thickness*.08);cx.stroke();
    
    // Inner dark edge
    cx.beginPath();cx.arc(CX,CY,rf,0,Math.PI*2);
    cx.strokeStyle='#033040';cx.lineWidth=Math.max(1.5,thickness*.05);cx.stroke();
    
    // Highlight stripe
    cx.beginPath();cx.arc(CX,CY,rb-thickness*.15,0,Math.PI*2);
    cx.strokeStyle='rgba(150,240,255,.2)';cx.lineWidth=Math.max(1,thickness*.04);cx.stroke();
  }
  
  if(o.type==='block'){
    const sa=o.angle-o.arcSize/2,ea=o.angle+o.arcSize/2;
    const midA=(sa+ea)/2;
    const outerFront=rb;
    const innerFront=Math.max(rf+thickness*.18, rb-thickness*.58);
    const outerBack=Math.max(innerFront+1, rb-thickness*.24);
    const bevel=Math.min(.045, o.arcSize*.16);

    // back body
    cx.beginPath();
    cx.arc(CX,CY,outerBack,sa,ea);cx.arc(CX,CY,rf,ea,sa,true);cx.closePath();
    cx.fillStyle='#6e3016';cx.fill();

    // front face, brighter and flatter like inserted wedge block
    cx.beginPath();
    cx.arc(CX,CY,outerFront,sa+bevel,ea-bevel);
    cx.arc(CX,CY,innerFront,ea-bevel,sa+bevel,true);
    cx.closePath();
    cx.fillStyle='#c87445';cx.fill();

    // darker side bevel strips
    for(const pair of [[sa,sa+bevel],[ea-bevel,ea]]){
      cx.beginPath();
      cx.arc(CX,CY,outerFront,pair[0],pair[1]);
      cx.arc(CX,CY,rf,pair[1],pair[0],true);
      cx.closePath();
      cx.fillStyle='#8c4322';cx.fill();
    }

    // front outline softer and more realistic, less neon-like
    cx.beginPath();cx.arc(CX,CY,outerFront,sa+bevel,ea-bevel);
    cx.strokeStyle='rgba(225,165,115,.45)';cx.lineWidth=Math.max(1.1,thickness*.035);cx.stroke();

    // outer shadow lip so the outside edge feels thicker and less flat
    cx.beginPath();cx.arc(CX,CY,outerFront-frontWeight*.95,sa+bevel*.95,ea-bevel*.95);
    cx.strokeStyle='rgba(88,38,18,.18)';cx.lineWidth=Math.max(1,thickness*.03);cx.stroke();

    // inner front shadow to separate face from body
    cx.beginPath();cx.arc(CX,CY,innerFront,sa+bevel,ea-bevel);
    cx.strokeStyle='rgba(80,30,12,.28)';cx.lineWidth=Math.max(1,thickness*.024);cx.stroke();

    // subtle center plane highlight like the original chunky pieces
    cx.beginPath();cx.arc(CX,CY,(outerFront+innerFront)*.5,sa+bevel*1.2,ea-bevel*1.2);
    cx.strokeStyle='rgba(255,220,180,.06)';cx.lineWidth=Math.max(1,thickness*.016);cx.stroke();

    // remove hard radial seams almost completely, keep only a very soft corner suggestion
    for(const edgeA of[sa,ea]){
      const ex=CX+Math.cos(edgeA)*(outerFront-frontWeight*.5);
      const ey=CY+Math.sin(edgeA)*(outerFront-frontWeight*.5);
      const ex2=CX+Math.cos(edgeA)*(outerFront-frontWeight*.08);
      const ey2=CY+Math.sin(edgeA)*(outerFront-frontWeight*.08);
      cx.beginPath();cx.moveTo(ex,ey);cx.lineTo(ex2,ey2);
      cx.strokeStyle='rgba(70,30,14,.08)';cx.lineWidth=Math.max(1,thickness*.014);cx.stroke();
    }

    // tiny perspective notch so it reads more as a wedge than a painted ring slice
    const nx1=CX+Math.cos(midA)*(innerFront+thickness*.05);
    const ny1=CY+Math.sin(midA)*(innerFront+thickness*.05);
    const nx2=CX+Math.cos(midA)*(outerFront-thickness*.08);
    const ny2=CY+Math.sin(midA)*(outerFront-thickness*.08);
    cx.beginPath();cx.moveTo(nx1,ny1);cx.lineTo(nx2,ny2);
    cx.strokeStyle='rgba(120,55,24,.08)';cx.lineWidth=Math.max(1,thickness*.014);cx.stroke();
  }
  
  if(o.type==='ring_segment'){
    const sa=o.angle-o.arcSize/2,ea=o.angle+o.arcSize/2;
    const blueThickness=thickness*.72;
    const blueOuter=rb;
    const blueInner=rb-blueThickness;
    const t1=blueOuter-blueThickness*.33, t2=blueOuter-blueThickness*.66;
    cx.beginPath();cx.arc(CX,CY,blueInner+1,sa,ea);cx.arc(CX,CY,Math.max(blueInner-1,0),ea,sa,true);cx.closePath();
    cx.fillStyle='#043848';cx.fill();
    cx.beginPath();cx.arc(CX,CY,blueOuter,sa,ea);cx.arc(CX,CY,t1,ea,sa,true);cx.closePath();
    cx.fillStyle='#0bbccc';cx.fill();
    cx.beginPath();cx.arc(CX,CY,t1,sa,ea);cx.arc(CX,CY,t2,ea,sa,true);cx.closePath();
    cx.fillStyle='#088898';cx.fill();
    cx.beginPath();cx.arc(CX,CY,t2,sa,ea);cx.arc(CX,CY,blueInner,ea,sa,true);cx.closePath();
    cx.fillStyle='#055868';cx.fill();
    cx.beginPath();cx.arc(CX,CY,blueOuter,sa-.004,ea+.004);
    cx.strokeStyle='#44eeff';cx.lineWidth=Math.max(2.5,thickness*.06);cx.stroke();
    cx.beginPath();cx.arc(CX,CY,blueInner,sa+.001,ea-.001);
    cx.strokeStyle='#033848';cx.lineWidth=Math.max(1.5,thickness*.04);cx.stroke();
    for(const edgeA of[sa,ea]){
      cx.beginPath();cx.moveTo(CX+Math.cos(edgeA)*blueInner,CY+Math.sin(edgeA)*blueInner);cx.lineTo(CX+Math.cos(edgeA)*blueOuter,CY+Math.sin(edgeA)*blueOuter);
      cx.strokeStyle='#066878';cx.lineWidth=Math.max(3,thickness*.07);cx.stroke();
    }
  }
}

function drawSingleCoin(c){
  if(c.collected)return;
  const r=z2r(c.z);
  const scale=zScale(c.z);
  const sz=2+scale*20;
  const x=CX+Math.cos(c.angle)*r,y=CY+Math.sin(c.angle)*r;
  
  if(c.missed){
    // Missed coin: grey, fading out, shrinking
    c.missedTime=(c.missedTime||0)+.03;
    const fade=Math.max(0,1-c.missedTime);
    if(fade<.01)return;
    cx.globalAlpha=fade*.6;
    const msz=sz*(1-c.missedTime*.5);
    cx.beginPath();cx.arc(x,y,msz,0,Math.PI*2);
    cx.fillStyle='#555';cx.fill();
    cx.strokeStyle='#333';cx.lineWidth=1.5;cx.stroke();
    // Red X
    const xs=msz*.5;
    cx.beginPath();cx.moveTo(x-xs,y-xs);cx.lineTo(x+xs,y+xs);
    cx.moveTo(x+xs,y-xs);cx.lineTo(x-xs,y+xs);
    cx.strokeStyle=`rgba(255,60,60,${fade})`;cx.lineWidth=2;cx.stroke();
    cx.globalAlpha=1;
    return;
  }
  
  // Normal coin
  cx.beginPath();cx.arc(x,y,sz+2,0,Math.PI*2);cx.strokeStyle='#0a1020';cx.lineWidth=3;cx.stroke();
  cx.beginPath();cx.arc(x,y,sz,0,Math.PI*2);
  const g=cx.createRadialGradient(x-sz*.2,y-sz*.2,0,x,y,sz);
  g.addColorStop(0,'#ffe060');g.addColorStop(.6,'#cc9900');g.addColorStop(1,'#886600');
  cx.fillStyle=g;cx.fill();
  cx.beginPath();cx.arc(x,y,sz*.35,0,Math.PI*2);cx.fillStyle='#ddaa20';cx.fill();cx.strokeStyle='#aa8800';cx.lineWidth=1;cx.stroke();
  cx.beginPath();cx.arc(x-sz*.18,y-sz*.18,sz*.2,0,Math.PI*2);cx.fillStyle='rgba(255,255,220,.5)';cx.fill();
}
initBands();
requestAnimationFrame(loop);
</script>
